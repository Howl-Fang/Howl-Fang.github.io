<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Howl-Fang.win</title>
    <!-- Client-side redirect (not a 301) -->
    <meta http-equiv="refresh" content="3; url='https://howl-fang.win/'" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #2d3748;
            font-weight: 600;
        }
        
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 25px;
        }
        
        .redirect-timer {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .timer-number {
            display: inline-block;
            background-color: #edf2f7;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            color: #4c51bf;
        }
        
        .redirect-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            border: none;
            margin-top: 10px;
        }
        
        .redirect-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .redirect-link:active {
            transform: translateY(0);
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 14px;
            text-align: left;
        }
        
        .info-box p {
            margin-bottom: 0;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">E</div>
        <h1>Redirecting to Howl-Fang.win</h1>
        <p>You're being automatically redirected to our destination page. Please wait a moment.</p>
        
        <div class="timer-container">
            <div class="spinner"></div>
            <div class="redirect-timer">
                You will be redirected in <span class="timer-number" id="countdown">3</span> seconds...
            </div>
        </div>
        
        <p>If the redirect doesn't work automatically, please click the button below:</p>
        
        <a href="https://howl-fang.win/" class="redirect-link">Go to Howl-Fang.win Now</a>
        
        <div class="info-box">
            <p><strong>Note:</strong> This is a client-side redirect.</p>
        </div>
    </div>

    <script>
        // Countdown timer
        let countdownElement = document.getElementById('countdown');
        let seconds = 3;
        
        function updateCountdown() {
            countdownElement.textContent = seconds;
            seconds--;
            
            if (seconds >= 0) {
                setTimeout(updateCountdown, 1000);
            }
        }
        
        // Start the countdown
        updateCountdown();
    </script>
</body>
</html>
