<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Example.com</title>
    <!-- Client-side redirect (not a 301) -->
    <meta http-equiv="refresh" content="0; url='https://example.com/'" />
</head>
<body>
    <h1>Redirecting to Example.com</h1>
    <p>If you are not redirected automatically, click the link below:</p>
    <a href="https://example.com/">Go to Example.com</a>
</body>
</html>
